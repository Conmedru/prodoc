name: Scrape Prodoctorov Doctors

on:
  # Manual trigger (workflow_dispatch)
  workflow_dispatch:
    inputs:
      city:
        description: 'City slug (default: moskva)'
        required: false
        default: 'moskva'
      sample_only:
        description: 'Run sample only (20 doctors) vs full pilot'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # Schedule trigger (uncomment to run automatically)
  # schedule:
  #   - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper (sample)
        if: github.event.inputs.sample_only == 'true'
        run: |
          python sample_20.py

      - name: Run scraper (full pilot)
        if: github.event.inputs.sample_only != 'true'
        run: |
          python main.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: doctors-excel-${{ github.run_id }}
          path: |
            output/*.xlsx
            output/checkpoints/*.json
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            scraper.log
          retention-days: 7
